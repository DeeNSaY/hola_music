services:
  - type: web
    name: hola-music
    runtime: python
    repo: https://github.com/ТВОЙ_НИК/hola-music
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: VK_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true