{% extends "base.html" %}
{% block title %}404 - Страница не найдена{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-content">
        <h1>404</h1>
        <h2>Страница не найдена</h2>
        <p>Извините, запрошенная страница не существует.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">Вернуться на главную</a>
    </div>
</div>
{% endblock %}
